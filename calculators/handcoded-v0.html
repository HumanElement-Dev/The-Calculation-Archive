<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hand Coded V0 — The Calculation Archive</title>
  <link rel="stylesheet" href="../css/calculator.css">
  <style>
    .v0 {
      text-align: center;
    }

    .v0-top {
      margin-bottom: 16px;
    }

    .v0-top button {
      font-size: 30px;
      width: 90px;
      height: 50px;
      cursor: pointer;
    }

    .v0-top input {
      font-size: 36px;
      text-align: center;
      width: 280px;
      height: 50px;
    }

    .v0 button {
      font-size: 26px;
      width: 90px;
      height: 70px;
      margin: 2px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="../index.html">The Calculation Archive</a>
  </nav>

  <div class="stage">

    <div class="v0">
      <div class="v0-top">
        <button onclick="calc.clear()">C</button>
        <input id="display" type="text" value="0" readonly>
      </div>

      <div>
        <button onclick="calc.press('7')">7</button>
        <button onclick="calc.press('8')">8</button>
        <button onclick="calc.press('9')">9</button>
        <button onclick="calc.press('/')">/</button>
      </div>
      <div>
        <button onclick="calc.press('4')">4</button>
        <button onclick="calc.press('5')">5</button>
        <button onclick="calc.press('6')">6</button>
        <button onclick="calc.press('-')">-</button>
      </div>
      <div>
        <button onclick="calc.press('1')">1</button>
        <button onclick="calc.press('2')">2</button>
        <button onclick="calc.press('3')">3</button>
        <button onclick="calc.press('*')">x</button>
      </div>
      <div>
        <button onclick="calc.press('0')">0</button>
        <button onclick="calc.press('.')">.</button>
        <button onclick="calc.equals()">=</button>
        <button onclick="calc.press('+')">+</button>
      </div>
    </div>

    <div class="placard">
      <h1>Hand Coded V0</h1>
      <div class="meta">2024 · The Original</div>
      <p>
        The first version of The Calculation Archive. Written by hand, exploring
        the question: what is the smallest possible calculator? No frameworks,
        no build tools — just the browser's defaults.
      </p>
    </div>

  </div>

  <script src="../js/calc.js"></script>
  <script>
    const calc = new Calc('display');
  </script>

</body>
</html>
