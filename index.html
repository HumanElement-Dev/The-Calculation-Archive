<html>
  <body style="text-align:center;margin-top:100px;">
      <input id="display" type="text" value="0" style="font-size:40px;text-align:center;width:200px;"><br><br>
      <button onclick="clearDisplay()" style="font-size:30px;width:120px;height:80px;">C</button><br><br>
      
      <button onclick="appendSymbol('1')">1</button>
      <button onclick="appendSymbol('2')">2</button>
      <button onclick="appendSymbol('3')">3</button><br><br>
      <button onclick="appendSymbol('4')">4</button>
      <button onclick="appendSymbol('5')">5</button>
      <button onclick="appendSymbol('6')">6</button><br><br>
      <button onclick="appendSymbol('7')">7</button>
      <button onclick="appendSymbol('8')">8</button>
      <button onclick="appendSymbol('9')">9</button>
      <button onclick="appendSymbol('0')">0</button><br><br>
      <button onclick="appendSymbol('+')">+</button>
      <button onclick="calculate()" style="font-size:30px;width:120px;height:80px;">=</button>
      
      
      <script>
        function appendSymbol(symbol) {
          const display = document.getElementById('display');
          if (display.value === '0') {
            display.value = symbol;
          } else {
            display.value += symbol;
          }
        }
        
        function calculate() {
          const display = document.getElementById('display');
          try {
            display.value = eval(display.value);
          } catch (e) {
            display.value = 'Error';
          }
        }
        
        function clearDisplay() {
          document.getElementById('display').value = '0';
        }
      </script>
    </body>
</html>
