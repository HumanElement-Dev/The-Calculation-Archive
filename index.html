<html>
  <body style="text-align:center;margin-top:100px;">
      <button onclick="clearDisplay()" style="font-size:40px;width:100px;height:50px;">C</button>
      <input id="display" type="text" value="0" style="font-size:40px;text-align:center;width:300px;height:50px;"><br><br>
      <button onclick="appendSymbol('7')" style="font-size:30px;width:100px;height:80px;">7</button>
      <button onclick="appendSymbol('8')" style="font-size:30px;width:100px;height:80px;">8</button>
      <button onclick="appendSymbol('9')" style="font-size:30px;width:100px;height:80px;">9</button>
      <button onclick="appendSymbol('/')" style="font-size:30px;width:100px;height:80px;">/</button><br><br>
      <button onclick="appendSymbol('4')" style="font-size:30px;width:100px;height:80px;">4</button>
      <button onclick="appendSymbol('5')" style="font-size:30px;width:100px;height:80px;">5</button>
      <button onclick="appendSymbol('6')" style="font-size:30px;width:100px;height:80px;">6</button>
      <button onclick="appendSymbol('-')" style="font-size:30px;width:100px;height:80px;">-</button><br><br>
      <button onclick="appendSymbol('1')" style="font-size:30px;width:100px;height:80px;">1</button>
      <button onclick="appendSymbol('2')" style="font-size:30px;width:100px;height:80px;">2</button>
      <button onclick="appendSymbol('3')" style="font-size:30px;width:100px;height:80px;">3</button>
      <button onclick="appendSymbol('*')" style="font-size:30px;width:100px;height:80px;">x</button><br><br>
      
      
      <button onclick="appendSymbol('0')" style="font-size:30px;width:100px;height:80px;">0</button>
      <button onclick="appendSymbol('.')" style="font-size:30px;width:100px;height:80px;">.</button>
      <button onclick="calculate()" style="font-size:30px;width:100px;height:80px;">=</button>
      <button onclick="appendSymbol('+')" style="font-size:30px;width:100px;height:80px;">+</button>
      
      
      <script>
        function appendSymbol(symbol) {
          const display = document.getElementById('display');
          if (display.value === '0') {
            display.value = symbol;
          } else {
            display.value += symbol;
          }
        }
        
        function calculate() {
          const display = document.getElementById('display');
          try {
            display.value = eval(display.value);
          } catch (e) {
            display.value = 'Error';
          }
        }
        
        function clearDisplay() {
          document.getElementById('display').value = '0';
        }
      </script>
    </body>
</html>
